name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        # No windows leg: the app requires tmux (unsupported there), and the
        # runner's VS finder currently breaks the node-pty ABI rebuild anyway
        # (node-gyp ERR_CHILD_PROCESS_STDIO_MAXBUFFER).
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci triggers postinstall (electron-rebuild for node-pty against
      # Electron's ABI), so native toolchains on the runners are exercised here.
      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Guard against pre-rename residue
        run: |
          if grep -rn --exclude-dir=node_modules --exclude-dir=out --exclude-dir=.git \
              --exclude=package-lock.json --exclude=launch-plan.html \
              -i "cava" src cli mobile tests README.md | grep -v "\.cava"; then
            echo "::error::Found leftover pre-rename 'cava' references (see above)"
            exit 1
          fi
          # marketing-plan.html is competitive analysis — naming competitors
          # there is the document's job, not product copy.
          if grep -rn --exclude-dir=node_modules --exclude-dir=out --exclude-dir=.git \
              --exclude=package-lock.json --exclude=marketing-plan.html \
              -i "maestri" src cli mobile tests docs README.md package.json; then
            echo "::error::Found 'maestri' references — product copy must stand on its own (see above)"
            exit 1
          fi
