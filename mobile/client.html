<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Cookrew Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen:wght@400;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
/>
<style>
  /* Same cookrew-beta arcade theme as the desktop renderer (styles.css):
     cream chrome, hard bevel shadows, phosphor CRT screens, and the
     vibe-island dark cards for agent terminals. */
  :root {
    --cream: #faf8f4;
    --cream-hi: #fffef5;
    --cream-md: #f5f0e8;
    --cream-lo: #ece6da;
    --ink: #2d2a20;
    --ink-soft: #5c4a1f;
    --muted: #78716c;
    --dim: #a8a29e;
    --line: #2d2a20;
    --line-soft: #d9d3c5;
    --amber: #ffd600;
    --amber-soft: #fff3ad;
    --amber-deep: #d97706;
    --phos: #e9b949;
    --phos-dim: #8a6d1c;
    --phos-glow: #ffd77a;
    --phos-bg: #14110a;
    --hp: #6bbe58;
    --rose: #dc2626;
    --violet: #9b8acb;
    --note-bg: #fff3ad;
    --note-text: #3a3625;

    --vi-bg: #121214;
    --vi-panel: #1c1c1f;
    --vi-line: #2c2c30;
    --vi-text: #f5f5f7;
    --vi-dim: #98989d;
    --vi-working: #ff9f0a;
    --vi-wait: #ff453a;
    --vi-done: #32d74b;

    --font-pixel: 'Silkscreen', 'Courier New', monospace;
    --font-screen: 'VT323', 'Courier New', monospace;
    --font-mono: 'JetBrains Mono', 'SF Mono', Menlo, monospace;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    height: 100dvh;
    overflow: hidden;
    background: var(--cream);
    color: var(--ink);
    font-family: var(--font-body);
    overscroll-behavior: none;
  }

  /* ---- app shell ---- */

  #app { height: 100dvh; display: flex; flex-direction: column; }

  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: max(10px, env(safe-area-inset-top)) 14px 10px;
    background: var(--cream-hi);
    border-bottom: 2px solid var(--line);
    z-index: 5;
  }

  .cr-logo-mark {
    width: 22px;
    height: 22px;
    flex: 0 0 auto;
    display: block;
  }

  .cr-logo {
    font-family: var(--font-pixel);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.08em;
    text-shadow: 2px 2px 0 var(--amber);
  }

  .cr-kicker {
    font-family: var(--font-pixel);
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-soft);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cr-chip {
    font-family: var(--font-pixel);
    font-size: 8.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--cream-md);
    border: 1.5px solid var(--line);
    padding: 2px 6px;
    white-space: nowrap;
  }

  .cr-chip.amber { background: var(--amber); }
  .cr-chip.violet { background: var(--violet); color: var(--cream-hi); }
  .cr-chip.attention { background: var(--rose); color: var(--cream-hi); animation: cr-blink 1.1s steps(2) infinite; }

  .cr-led {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--hp);
    box-shadow: 0 0 6px rgba(107, 190, 88, 0.8);
    flex: 0 0 auto;
  }
  .cr-led.busy { background: var(--amber); box-shadow: 0 0 8px rgba(255, 214, 0, 0.9); animation: cr-blink 0.9s steps(2) infinite; }
  .cr-led.off { background: var(--dim); box-shadow: none; }

  .cr-btn {
    font-family: var(--font-pixel);
    font-size: 9.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--cream-hi);
    border: 2px solid var(--line);
    box-shadow: 2px 2px 0 var(--line);
    padding: 6px 10px;
    cursor: pointer;
    /* Keep the label on one line: as a flex item next to a long URL/title
       the button would otherwise be squeezed until its words wrap. */
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .cr-btn:active { transform: translate(2px, 2px); box-shadow: none; }
  .cr-btn.primary { background: var(--amber); }

  #wsName { margin-left: auto; max-width: 40vw; }

  /* ---- stage / world (the canvas) ---- */

  #stage {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    touch-action: none;
    background: var(--cream);
    /* Faint dot grid so panning reads as movement, like a canvas app. */
    background-image: radial-gradient(var(--line-soft) 1px, transparent 1px);
    background-size: 26px 26px;
  }

  #world {
    position: absolute;
    top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  #stageEmpty {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: var(--font-pixel);
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  #fitBtn {
    position: absolute;
    right: 12px;
    bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 4;
  }

  /* ---- cards (canvas nodes) ---- */

  .card {
    position: absolute;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--cream-hi);
    border: 2px solid var(--line);
    box-shadow: 3px 3px 0 var(--line);
    cursor: pointer;
  }

  .node-header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 10px;
    background: var(--cream-md);
    border-bottom: 2px solid var(--line);
    flex: 0 0 auto;
    min-width: 0;
  }

  .node-title {
    font-family: var(--font-pixel);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* phosphor CRT screen (shell tails, fullscreen terminal) */

  .cr-phos {
    background: var(--phos-bg);
    color: var(--phos);
    font-family: var(--font-screen);
    font-size: 15px;
    line-height: 1.25;
    position: relative;
  }

  .cr-crt::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255, 255, 255, 0.03) 0,
      rgba(255, 255, 255, 0.03) 1px,
      transparent 1px,
      transparent 3px
    );
  }

  .card-screen {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .phos-line { white-space: pre-wrap; word-break: break-word; overflow: hidden; }
  .phos-dim { color: var(--phos-dim); letter-spacing: 0.1em; }
  .phos-cursor { color: var(--phos-glow); animation: cr-blink 1s steps(2) infinite; }

  /* vibe-island agent card — typography inverse-scaled via --z (set on
     #world from 1/zoom) so cards stay readable at overview zoom, exactly
     like the desktop's semantic zoom. */

  .card.vi-card {
    background: #161618;
    border: 1px solid #2c2c30;
    border-radius: 12px;
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
  }
  .card.vi-card.working {
    border-color: rgba(255, 159, 10, 0.65);
    box-shadow: 0 0 0 2px rgba(255, 159, 10, 0.28), 0 10px 28px rgba(0, 0, 0, 0.45);
  }
  .card.vi-card.attention {
    border-color: rgba(255, 69, 58, 0.75);
    box-shadow: 0 0 0 2px rgba(255, 69, 58, 0.3), 0 10px 28px rgba(0, 0, 0, 0.45);
  }
  .card.offline { opacity: 0.55; }

  .vi-head {
    display: flex;
    align-items: center;
    min-width: 0;
    background: transparent;
    border-bottom: 1px solid #232327;
    gap: calc(8px * var(--z, 1));
    padding: calc(7px * var(--z, 1)) calc(11px * var(--z, 1));
    flex: 0 0 auto;
  }

  .vi-title {
    flex: 1;
    min-width: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
    font-size: calc(13px * var(--z, 1));
    font-weight: 700;
    color: var(--vi-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .vi-chip {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
    font-size: calc(9.5px * var(--z, 1));
    font-weight: 600;
    color: #c8c8cd;
    background: #2a2a2e;
    border-radius: calc(5px * var(--z, 1));
    padding: calc(2px * var(--z, 1)) calc(7px * var(--z, 1));
    white-space: nowrap;
    flex: 0 0 auto;
  }
  .vi-chip.tan { background: #4a3b2a; color: #e8c9a0; }
  .vi-chip.dim { color: #98989d; }

  /* Git visuals (Forge gitInfo shape) — mirror of styles.css .cr-git kit.
     Structure: .cr-git > .cr-git-branch (icon+name) · .cr-git-dirty (dot,
     dirty only) · .cr-git-track > .cr-git-ahead / .cr-git-behind (CSS-arrow
     + number, each omitted when its count is 0; track omitted when both 0).
     Dark card = default; add .on-cream on workspace-dir rows. */
  .cr-git { display: inline-flex; align-items: center; gap: calc(5px * var(--z, 1)); min-width: 0; flex: 0 1 auto; }
  .cr-git-branch {
    display: inline-flex; align-items: center; gap: calc(3px * var(--z, 1));
    font-family: var(--font-mono); font-size: calc(9.5px * var(--z, 1)); font-weight: 600;
    color: #b9e6a8; background: #24331f; border-radius: calc(5px * var(--z, 1));
    padding: calc(2px * var(--z, 1)) calc(7px * var(--z, 1));
    max-width: calc(120px * var(--z, 1)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 0 1 auto;
  }
  .cr-git-branch .cr-icon { width: calc(10px * var(--z, 1)); height: calc(10px * var(--z, 1)); flex: 0 0 auto; opacity: 0.85; }
  .cr-git-dirty { width: calc(7px * var(--z, 1)); height: calc(7px * var(--z, 1)); border-radius: 50%; background: var(--amber); border: 1px solid var(--ink); flex: 0 0 auto; }
  .cr-git-track { display: inline-flex; align-items: center; gap: calc(4px * var(--z, 1)); font-family: var(--font-mono); font-size: calc(9px * var(--z, 1)); font-weight: 600; flex: 0 0 auto; }
  .cr-git-ahead, .cr-git-behind { display: inline-flex; align-items: center; gap: calc(2px * var(--z, 1)); }
  .cr-git-ahead::before, .cr-git-behind::before { content: ''; width: 0; height: 0; border-left: calc(3px * var(--z, 1)) solid transparent; border-right: calc(3px * var(--z, 1)) solid transparent; }
  .cr-git-ahead { color: #6bbe58; }
  .cr-git-ahead::before { border-bottom: calc(5px * var(--z, 1)) solid currentColor; }
  .cr-git-behind { color: #e0975a; }
  .cr-git-behind::before { border-top: calc(5px * var(--z, 1)) solid currentColor; }
  /* Cream chrome (workspace dir rows): ink-on-cream pill. */
  .cr-git.on-cream .cr-git-branch { color: var(--ink-soft); background: var(--cream-md); border: 1.5px solid var(--line-soft); font-size: 9px; padding: 1px 5px; }
  .cr-git.on-cream .cr-git-branch .cr-icon { width: 9px; height: 9px; }
  .cr-git.on-cream .cr-git-dirty { width: 6px; height: 6px; background: var(--amber-deep); }
  .cr-git.on-cream .cr-git-track { font-size: 8.5px; }

  /* Mini status coin: replaces the old LED dots; ink rim keeps contrast. */
  .vi-coin-led { width: calc(13px * var(--z, 1)); height: calc(13px * var(--z, 1)); flex: 0 0 auto; }
  .vi-coin-led.idle, .vi-coin-led.replied { color: var(--vi-done); }
  .vi-coin-led.thinking { color: var(--vi-working); animation: ava-blink 1s steps(2) infinite; }
  .vi-coin-led.waiting { color: var(--vi-wait); animation: ava-blink 0.55s steps(2) infinite; }
  .vi-coin-led.off { color: #5a5a5f; }
  .popout-header .vi-coin-led { width: 14px; height: 14px; }
  .popout-header .vi-coin-led.idle, .popout-header .vi-coin-led.replied { color: var(--hp); }
  .popout-header .vi-coin-led.thinking { color: var(--amber); }
  .popout-header .vi-coin-led.waiting { color: var(--rose); }

  .vi-card-body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: calc(6px * var(--z, 1));
    padding: calc(9px * var(--z, 1)) calc(11px * var(--z, 1));
    overflow: hidden;
    color: var(--vi-text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
  }

  .vi-ready { font-size: calc(14px * var(--z, 1)); font-weight: 600; color: var(--vi-done); }

  .vi-turn-title {
    flex: 0 0 auto;
    font-weight: 700;
    font-size: calc(14px * var(--z, 1));
    line-height: 1.3;
    color: var(--vi-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .vi-you {
    flex: 0 0 auto;
    font-family: var(--font-mono);
    font-size: calc(12px * var(--z, 1));
    color: var(--vi-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vi-you-label { color: #64d2ff; font-weight: 600; }

  /* Typed-but-unsent input box content (DEFECT 2): clearly the inputbox. */
  .vi-pending {
    flex: 0 0 auto;
    font-family: var(--font-mono);
    font-style: italic;
    font-size: calc(11px * var(--z, 1));
    color: var(--vi-dim);
    opacity: 0.75;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vi-pending-label { font-style: normal; font-weight: 600; color: var(--vi-working); }

  .vi-latest {
    display: flex;
    align-items: center;
    gap: calc(7px * var(--z, 1));
    font-size: calc(13.5px * var(--z, 1));
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .vi-latest.working { color: var(--vi-working); }
  .vi-latest.waiting { color: var(--vi-wait); animation: cr-blink 1.1s steps(2) infinite; }
  .vi-latest.done { color: var(--vi-text); font-weight: 500; }
  .vi-latest-snip { color: var(--vi-dim); font-weight: 500; overflow: hidden; text-overflow: ellipsis; }

  .vi-dot {
    width: calc(7px * var(--z, 1));
    height: calc(7px * var(--z, 1));
    border-radius: 50%;
    background: currentColor;
    flex: 0 0 auto;
    box-shadow: 0 0 6px currentColor;
  }
  .vi-dot.pulse { animation: vi-pulse 1.2s ease-in-out infinite; }

  /* Status avatar (desktop AgentAvatar.tsx, Suite B minimal coin): the
     agent's brand coin IS the avatar; only it carries status. Idle/replied
     static; thinking spins; waiting rocks + blinks; replied adds the
     unread dot (cleared by acknowledge-on-view). */

  .vi-avatar {
    position: relative;
    width: calc(24px * var(--z, 1));
    height: calc(24px * var(--z, 1));
    flex: 0 0 auto;
    display: block;
  }
  .vi-avatar > svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .vi-avatar.idle .ava-coin-tint, .vi-avatar.replied .ava-coin-tint { color: var(--vi-done); }
  .vi-avatar.thinking .ava-coin-tint { color: var(--vi-working); }
  .vi-avatar.waiting .ava-coin-tint { color: var(--vi-wait); }
  .vi-avatar.off .ava-coin-tint { color: #5a5a5f; }
  .vi-avatar.thinking .ava-spin { animation: ava-spin 0.9s linear infinite; transform-box: fill-box; transform-origin: center; }
  .vi-avatar.waiting > svg { animation: ava-rock 0.8s ease-in-out infinite, ava-blink 0.8s steps(2) infinite; }
  .vi-unread {
    position: absolute;
    top: calc(-2px * var(--z, 1));
    right: calc(-2px * var(--z, 1));
    width: calc(8px * var(--z, 1));
    height: calc(8px * var(--z, 1));
    border-radius: 50%;
    background: var(--vi-wait);
    border: 1.5px solid var(--ink);
  }

  @keyframes ava-spin { 0% { transform: rotate(0) scaleX(1); } 25% { transform: rotate(90deg) scaleX(0.15); } 50% { transform: rotate(180deg) scaleX(1); } 75% { transform: rotate(270deg) scaleX(0.15); } 100% { transform: rotate(360deg) scaleX(1); } }
  @keyframes ava-rock { 0%, 100% { transform: rotate(-11deg); } 50% { transform: rotate(11deg); } }
  @keyframes ava-blink { 50% { opacity: 0.3; } }


  .vi-card-body {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: calc(6px * var(--z, 1));
    padding: calc(9px * var(--z, 1)) calc(11px * var(--z, 1));
    overflow: hidden;
    color: var(--vi-text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
  }

  .vi-ready { font-size: calc(14px * var(--z, 1)); font-weight: 600; color: var(--vi-done); }

  .vi-turn-title {
    flex: 0 0 auto;
    font-weight: 700;
    font-size: calc(14px * var(--z, 1));
    line-height: 1.3;
    color: var(--vi-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .vi-you {
    flex: 0 0 auto;
    font-family: var(--font-mono);
    font-size: calc(12px * var(--z, 1));
    color: var(--vi-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vi-you-label { color: #64d2ff; font-weight: 600; }

  /* Typed-but-unsent input box content (DEFECT 2): clearly the inputbox. */
  .vi-pending {
    flex: 0 0 auto;
    font-family: var(--font-mono);
    font-style: italic;
    font-size: calc(11px * var(--z, 1));
    color: var(--vi-dim);
    opacity: 0.75;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vi-pending-label { font-style: normal; font-weight: 600; color: var(--vi-working); }

  .vi-latest {
    display: flex;
    align-items: center;
    gap: calc(7px * var(--z, 1));
    font-size: calc(13.5px * var(--z, 1));
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .vi-latest.working { color: var(--vi-working); }
  .vi-latest.waiting { color: var(--vi-wait); animation: cr-blink 1.1s steps(2) infinite; }
  .vi-latest.done { color: var(--vi-text); font-weight: 500; }
  .vi-latest-snip { color: var(--vi-dim); font-weight: 500; overflow: hidden; text-overflow: ellipsis; }

  .vi-dot {
    width: calc(7px * var(--z, 1));
    height: calc(7px * var(--z, 1));
    border-radius: 50%;
    background: currentColor;
    flex: 0 0 auto;
    box-shadow: 0 0 6px currentColor;
  }
  .vi-dot.pulse { animation: vi-pulse 1.2s ease-in-out infinite; }


  /* mini mode (far-out zoom): terminal cards degrade to led + name,
     matching the desktop's MINI_ZOOM tile. Toggled by #world[data-mode]. */

  .mini-row {
    display: none;
    flex: 1;
    min-height: 0;
    align-items: center;
    gap: calc(8px * var(--z, 1));
    padding: 0 calc(12px * var(--z, 1));
  }
  .mini-name {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', sans-serif;
    font-size: calc(13px * var(--z, 1));
    font-weight: 700;
    color: var(--vi-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card.shell-card .mini-name { color: var(--ink); font-family: var(--font-pixel); }
  .mini-row .vi-coin-led { width: calc(14px * var(--z, 1)); height: calc(14px * var(--z, 1)); animation: none; }

  #world[data-mode='mini'] .tcard > :not(.mini-row) { display: none; }
  #world[data-mode='mini'] .tcard .mini-row { display: flex; }

  /* note card */

  .card.note-card { background: var(--note-bg); }
  .note-card .node-header { background: var(--amber); }
  .note-card .node-title { color: var(--note-text); }
  .note-body {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding: 10px 12px;
    color: var(--note-text);
    font-size: 12.5px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* browser card */

  .browser-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--violet);
    flex: 0 0 auto;
  }
  .browser-body-wrap {
    flex: 1;
    min-height: 0;
    position: relative;
    display: flex;
    overflow: hidden;
  }
  .browser-thumb {
    display: none;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    background: #fff;
  }
  .browser-thumb.ok { display: block; }
  .browser-thumb.ok + .browser-thumb-empty { display: none; }
  .browser-thumb-empty {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--cream-md);
    color: var(--muted);
    overflow: hidden;
  }
  .browser-thumb-glyph { font-size: 34px; color: var(--violet); }
  .browser-url {
    font-family: var(--font-mono);
    font-size: 10.5px;
    max-width: 90%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ---- fullscreen popout (tap a card) ---- */

  #popout {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    flex-direction: column;
    background: var(--cream-hi);
    animation: cr-fadein 160ms ease-out;
  }
  #popout.open { display: flex; }

  .popout-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: max(8px, env(safe-area-inset-top)) 12px 8px;
    background: var(--cream-md);
    border-bottom: 2px solid var(--line);
    flex: 0 0 auto;
    min-width: 0;
  }

  .popout-title {
    font-family: var(--font-pixel);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  #popClose { margin-left: auto; flex: 0 0 auto; }

  #popBody {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  /* Full terminal view: no soft-wrapping — lines are at most `cols` chars
     (the desktop PTY's width) and the font-size is computed so a full line
     exactly spans the phone screen. TUI box-drawing stays intact. */
  #popTerm {
    flex: 1;
    min-height: 0;
    overflow: auto;
    margin: 0;
    padding: 10px 12px;
    font-family: var(--font-screen);
    font-size: 14px;
    line-height: 1.22;
    white-space: pre;
    -webkit-overflow-scrolling: touch;
  }

  .popout-note {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    background: var(--note-bg);
    color: var(--note-text);
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .popout-browser {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--cream-md);
    color: var(--muted);
  }
  .popout-browser .browser-body-wrap { border-bottom: 2px solid var(--line); }
  .popout-browser .browser-thumb { object-fit: contain; background: #fff; }
  .popout-browser .browser-thumb-glyph { font-size: 56px; }
  .popout-browser a { color: inherit; text-decoration: none; }
  .browser-actions {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px max(10px, env(safe-area-inset-bottom));
    background: var(--cream-hi);
    min-width: 0;
  }
  .browser-actions .browser-url {
    flex: 1;
    min-width: 0;
    text-align: left;
    color: var(--muted);
  }

  .attention-banner {
    font-family: var(--font-pixel);
    font-size: 9px;
    letter-spacing: 0.1em;
    color: var(--cream-hi);
    background: var(--rose);
    padding: 4px 10px;
    animation: cr-blink 1.1s steps(2) infinite;
    flex: 0 0 auto;
  }

  /* composer (terminal popout only) */

  #composer {
    display: none;
    gap: 8px;
    padding: 10px 12px max(10px, env(safe-area-inset-bottom));
    background: var(--cream-hi);
    border-top: 2px solid var(--line);
    flex: 0 0 auto;
    align-items: center;
  }
  #composer.on { display: flex; }

  #prompt {
    flex: 1;
    min-width: 0;
    background: var(--cream);
    border: 2px solid var(--line);
    color: var(--ink);
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
  }
  #prompt:focus { border-color: var(--amber-deep); }

  button.round {
    width: 42px; height: 42px;
    border: 2px solid var(--line);
    box-shadow: 2px 2px 0 var(--line);
    background: var(--cream-hi);
    color: var(--ink);
    font-size: 16px;
    flex: 0 0 auto;
    padding: 0;
    cursor: pointer;
  }
  button.round:active { transform: translate(2px, 2px); box-shadow: none; }

  /* Cookrew icon set (inline sprite): sized per context, tinted by color. */
  .cr-icon {
    width: 12px;
    height: 12px;
    display: inline-block;
    vertical-align: -2px;
    flex: 0 0 auto;
  }
  button.round .cr-icon { width: 18px; height: 18px; vertical-align: middle; }
  #send { background: var(--amber); }
  #mic.listening { background: var(--rose); color: var(--cream-hi); animation: cr-blink 1s steps(2) infinite; }
  #speakToggle.on { background: var(--amber); }

  .card-status {
    font-family: var(--font-pixel);
    font-size: 8px;
    letter-spacing: 0.1em;
    color: var(--muted);
    white-space: nowrap;
  }
  .card-status.thinking { color: var(--amber-deep); animation: cr-blink 1.1s steps(2) infinite; }
  .card-status.replied { color: var(--hp); }
  .card-status.waiting { color: var(--rose); animation: cr-blink 1.1s steps(2) infinite; }

  @keyframes cr-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.15; } }
  @keyframes cr-fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes vi-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.45; transform: scale(0.8); } }
</style>
</head>
<body>
<!-- Cookrew icon sprite: chunky 16-grid glyphs, drawn in currentColor. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <g id="mi-expand" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="square"><path d="M9.6 2.4 H13.6 V6.4 M13.4 2.6 L9.2 6.8"/><path d="M6.4 13.6 H2.4 V9.6 M2.6 13.4 L6.8 9.2"/></g>
    <g id="mi-close" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="square"><path d="M3.6 3.6 L12.4 12.4 M12.4 3.6 L3.6 12.4"/></g>
    <g id="mi-attach" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M11.9 6.9 L7 11.8 a3.1 3.1 0 0 1 -4.4 -4.4 L8.5 1.5 a2.2 2.2 0 0 1 3.1 3.1 L6.2 10 a1.1 1.1 0 0 1 -1.6 -1.6 L9.2 3.8"/></g>
    <g id="mi-mic" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="6" y="1.9" width="4" height="7" rx="2"/><path d="M3.7 7.6 a4.3 4.3 0 0 0 8.6 0"/><path d="M8 11.9 V13.9" stroke-linecap="square"/></g>
    <g id="mi-speaker"><path d="M2.2 5.8 H5 L8.8 2.6 V13.4 L5 10.2 H2.2 Z" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/><path d="M10.8 5.4 C 12 6.6 12 9.4 10.8 10.6 M12.9 3.6 C 14.8 5.6 14.8 10.4 12.9 12.4" fill="none" stroke="currentColor" stroke-width="1.6"/></g>
    <g id="mi-send" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M2.4 8 H12.2"/><path d="M8.6 3.6 L13 8 L8.6 12.4"/></g>
  </defs>
</svg>
<div id="app">
  <header>
    <svg class="cr-logo-mark" viewBox="0 0 32 32" role="img" aria-label="Cookrew logo: baby hand saying yes">
      <defs>
        <path id="cr-logo-hand" d="M 16.7 1.2 C 17.8 1.2 18.4 1.8 18.5 2.7 C 18.9 5.3 19.0 8.5 19.2 10.6 C 19.3 11.0 19.5 11.0 19.7 10.7 C 20.0 10.1 20.5 9.5 21.1 9.6 C 21.7 9.7 22.0 10.3 22.2 10.7 C 22.9 10.1 24.0 9.7 25.0 10.2 C 26.3 11.0 27.3 12.4 27.4 13.8 C 27.5 14.9 27.3 15.8 27.0 16.6 C 26.7 17.5 26.3 18.1 25.9 18.7 C 25.4 19.6 24.6 21.6 24.2 23.3 C 24.6 24.4 24.8 25.6 24.6 26.8 C 24.3 29.0 23.6 31.0 23.3 33 L 8.7 33 C 8.9 31.0 9.0 28.6 9.6 27.0 C 9.8 25.9 10.1 24.6 10.8 23.8 C 10.4 22.3 9.3 20.6 8.9 19.2 C 8.5 17.6 7.5 14.9 6.8 13.5 C 6.0 11.9 5.0 9.5 4.4 7.8 C 4.0 6.6 4.2 5.6 5.1 5.1 C 6.0 4.6 7.0 4.8 7.3 5.8 C 8.2 7.7 11.0 10.2 13.0 11.2 C 13.4 11.5 13.5 11.9 13.7 11.9 C 13.9 11.9 14.2 11.6 14.4 11.1 C 14.8 9.8 14.9 5.2 15.0 2.9 C 15.1 1.7 15.7 1.2 16.7 1.2 Z"/>
      </defs>
      <use href="#cr-logo-hand" transform="translate(2 2)" fill="var(--amber)" stroke="var(--amber)" stroke-width="3" stroke-linejoin="round"/>
      <use href="#cr-logo-hand" fill="var(--ink)" stroke="var(--ink)" stroke-width="3" stroke-linejoin="round"/>
      <use href="#cr-logo-hand" fill="var(--cream-hi)"/>
      <path d="M 13.5 14.4 q 0.6 0.55 1.2 0.5 M 16.5 15.2 q 0.6 0.55 1.2 0.5 M 19.4 16.1 q 0.6 0.55 1.2 0.5" fill="none" stroke="var(--ink)" stroke-width="0.85" stroke-linecap="round"/>
      <path d="M 14.0 23.6 Q 17.8 22.9 22.6 23.4" fill="none" stroke="var(--ink)" stroke-width="1.1" stroke-linecap="round"/>
    </svg>
    <span class="cr-logo">COOKREW</span>
    <span class="cr-kicker">Mobile</span>
    <span id="wsName" class="cr-chip amber">…</span>
  </header>
  <div id="stage">
    <div id="world" data-mode="compact"></div>
    <div id="stageEmpty">NO CARDS YET</div>
    <button id="fitBtn" class="cr-btn">FIT <svg class="cr-icon" viewBox="0 0 16 16"><use href="#mi-expand"/></svg></button>
  </div>
</div>

<div id="popout">
  <div class="popout-header">
    <svg id="popLed" class="vi-coin-led idle" viewBox="0 0 26 26" aria-hidden="true"><circle cx="13" cy="13" r="11.5" fill="currentColor" stroke="var(--ink)" stroke-width="2"/><circle cx="13" cy="13" r="8.9" fill="none" stroke="#1c1408" stroke-width="1.2" opacity="0.35"/></svg>
    <span id="popTitle" class="popout-title">—</span>
    <span id="popStatus" class="card-status"></span>
    <button id="popClose" class="cr-btn"><svg class="cr-icon" viewBox="0 0 16 16"><use href="#mi-close"/></svg> CLOSE</button>
  </div>
  <div id="popAttention" class="attention-banner" style="display:none">⚠ NEEDS ATTENTION</div>
  <div id="popBody"></div>
  <div id="composer">
    <button class="round" id="attach" title="Attach file"><svg class="cr-icon" viewBox="0 0 16 16"><use href="#mi-attach"/></svg></button>
    <input id="attachFile" type="file" multiple style="display:none" />
    <button class="round" id="mic" title="Voice dictation"><svg class="cr-icon" viewBox="0 0 16 16"><use href="#mi-mic"/></svg></button>
    <input id="prompt" placeholder="Message this agent…" autocomplete="off" />
    <button class="round" id="speakToggle" title="Speak replies"><svg class="cr-icon" viewBox="0 0 16 16"><use href="#mi-speaker"/></svg></button>
    <button class="round" id="send" title="Send"><svg class="cr-icon" viewBox="0 0 16 16"><use href="#mi-send"/></svg></button>
  </div>
</div>

<script>
(() => {
  'use strict'
  const world = document.getElementById('world')
  const stage = document.getElementById('stage')
  const stageEmpty = document.getElementById('stageEmpty')
  const popout = document.getElementById('popout')
  const popBody = document.getElementById('popBody')
  const popTitle = document.getElementById('popTitle')
  const popLed = document.getElementById('popLed')
  const popStatus = document.getElementById('popStatus')
  const popAttention = document.getElementById('popAttention')
  const composer = document.getElementById('composer')
  const promptEl = document.getElementById('prompt')
  const micBtn = document.getElementById('mic')
  const sendBtn = document.getElementById('send')
  const speakToggle = document.getElementById('speakToggle')

  const STATUS_LABEL = { idle: 'READY', thinking: 'WORKING', waiting: 'NEEDS ATTENTION', replied: 'TURN COMPLETE' }
  const MINI_ZOOM = 0.22

  let nodes = []
  let activities = {}
  let openId = null
  let speakReplies = false
  let pinnedToBottom = true
  let lastRenderKey = ''

  /* ---------- api ---------- */

  async function api(path, options) {
    const response = await fetch(path, options)
    if (!response.ok) throw new Error((await response.json()).error || response.status)
    return response.json()
  }

  function postJson(text) {
    return { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ text }) }
  }

  /* ---------- helpers ---------- */

  const esc = (s) => String(s ?? '').replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]))

  function firstLine(text, max) {
    const line = String(text).split('\n').find((l) => l.trim() !== '') || ''
    return line.length > max ? line.slice(0, max - 1) + '…' : line
  }

  function stripStatus(status) {
    if (!status) return null
    const cleaned = status.replace(/\s*\((?:[^)]*esc to interrupt[^)]*)\)\s*$/i, '').trim()
    return cleaned.length > 0 ? cleaned : null
  }

  /* Per-agent pixel sprites, same 11×8 grids as the desktop AgentSprite.tsx:
     Claude Code starburst, Codex ring, OpenCode terminal block, invader fallback. */

  /* Agent coin face: brand mark stamped on a disc; disc tints via
     currentColor. Marks echo each agent's real logo: Claude sunburst,
     OpenAI blossom (Codex), opencode block-cursor, invader for Shell. */
  function brandMark(kind) {
    const S = '#1c1408'
    if (kind === 'claude') {
      let rays = ''
      for (let i = 0; i < 8; i++) {
        const a = ((i * 45 - 90) * Math.PI) / 180
        const r = i % 2 === 0 ? 7.2 : 6.4
        rays += `<line x1="13" y1="13" x2="${(13 + Math.cos(a) * r).toFixed(2)}" y2="${(13 + Math.sin(a) * r).toFixed(2)}"/>`
      }
      return `<g stroke="${S}" stroke-width="2.5" stroke-linecap="round">${rays}</g>`
    }
    if (kind === 'codex') {
      let petals = ''
      for (let i = 0; i < 6; i++) petals += `<rect x="11.8" y="4.4" width="2.4" height="8.4" rx="1.2" fill="${S}" transform="rotate(${i * 60} 13 13) rotate(27 13 8.6)"/>`
      return petals
    }
    if (kind === 'opencode') {
      return `<rect x="7.6" y="7" width="6.2" height="10" rx="1" fill="${S}"/><rect x="15.4" y="14.8" width="3.6" height="2.2" rx="0.6" fill="${S}"/>`
    }
    const grid = ['.X...X.', '..X.X..', '.XXXXX.', 'XX.X.XX', 'XXXXXXX', '.X...X.']
    const cell = 2.4
    const ox = 13 - (7 * cell) / 2
    const oy = 13 - (grid.length * cell) / 2
    const cells = []
    grid.forEach((row, y) => {
      Array.from(row).forEach((c, x) => {
        if (c === 'X') cells.push(`<rect x="${(ox + x * cell).toFixed(2)}" y="${(oy + y * cell).toFixed(2)}" width="${cell}" height="${cell}" fill="${S}"/>`)
      })
    })
    return cells.join('')
  }

  function coinFace(preset) {
    const kind = preset === null ? null
      : /claude/i.test(preset) ? 'claude'
      : /codex/i.test(preset) ? 'codex'
      : /opencode/i.test(preset) ? 'opencode'
      : 'shell'
    return `<g class="ava-coin-tint">
      <circle cx="13" cy="13" r="11.5" fill="currentColor" stroke="var(--ink)" stroke-width="2"/>
      <circle cx="13" cy="13" r="8.9" fill="none" stroke="#1c1408" stroke-width="1.2" opacity="0.35"/>
      ${kind ? brandMark(kind) : ''}
    </g>`
  }

  /* Status avatar (Suite B): the agent coin, tinted + moved by phase alone;
     replied carries the unread dot until acknowledged. */
  function agentAvatar(preset, phase) {
    const dot = phase === 'replied' ? '<span class="vi-unread"></span>' : ''
    return `<div class="vi-avatar ${phase}"><svg viewBox="0 0 26 26" aria-hidden="true"><g class="ava-spin">${coinFace(preset)}</g></svg>${dot}</div>`
  }

  /* Mini status coin standing in for the old LED dots. */
  function coinLed(phase, preset) {
    return `<svg class="vi-coin-led ${phase}" viewBox="0 0 26 26" aria-hidden="true">${coinFace(preset === undefined ? null : preset)}</svg>`
  }

  /* Git visuals (Forge gitInfo shape): branch chip · dirty dot · ahead/behind
     badge. `git` is a GitInfo the node/state payload carries; renders nothing
     until it arrives (inert on repos-less / not-yet-wired state). Mirrors the
     desktop GitChip markup + .cr-git CSS. */
  function gitChipHtml(git, onCream) {
    if (!git || !git.isRepo || git.error) return ''
    const branchIcon = '<svg class="cr-icon" viewBox="0 0 16 16"><g fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="4.4" cy="3.4" r="1.7"/><circle cx="11.6" cy="3.4" r="1.7"/><circle cx="8" cy="12.6" r="1.7"/><path d="M4.4 5.1 C 4.4 8.2 8 7.6 8 10.9 M11.6 5.1 C 11.6 8.2 8 7.6 8 10.9"/></g></svg>'
    const branch = git.branch
      ? `<span class="cr-git-branch" title="${esc(git.branch)}${git.dirty ? ' · uncommitted changes' : ''}">${branchIcon}${esc(git.branch)}</span>`
      : ''
    const dirty = git.dirty ? '<span class="cr-git-dirty" title="Uncommitted changes"></span>' : ''
    const track = (git.ahead > 0 || git.behind > 0)
      ? `<span class="cr-git-track" title="${git.ahead} ahead · ${git.behind} behind">${git.ahead > 0 ? `<span class="cr-git-ahead">${git.ahead}</span>` : ''}${git.behind > 0 ? `<span class="cr-git-behind">${git.behind}</span>` : ''}</span>`
      : ''
    return `<span class="cr-git${onCream ? ' on-cream' : ''}">${branch}${dirty}${track}</span>`
  }

  function agoLabel(since) {
    const mins = Math.max(0, Math.floor((Date.now() - since) / 60000))
    if (mins < 1) return 'now'
    if (mins < 60) return mins + 'm'
    const hours = Math.floor(mins / 60)
    return hours < 24 ? hours + 'h' : Math.floor(hours / 24) + 'd'
  }

  /* ---------- card markup (mirrors desktop TerminalNode views) ---------- */

  function agentCardHtml(node, activity) {
    const phase = activity ? activity.phase : 'idle'
    const off = !node.running
    const led = off ? 'off' : phase
    /* Header always names the agent; the Sous recap renders in the body and
       the prompt echo never appears in the header (it IS the You: line). */
    const turnTitle = activity && activity.title
      ? `<div class="vi-turn-title">${esc(firstLine(activity.title, 90))}</div>`
      : ''
    let latest = '<div class="vi-ready">Ready</div>'
    if (off) {
      latest = '<div class="vi-latest done"><span class="vi-latest-snip">Not running</span></div>'
    } else if (activity && activity.prompt !== null) {
      const glance = activity.glance
      const msg = glance && glance.message ? firstLine(glance.message, 90) : null
      if (phase === 'thinking') {
        latest = `<div class="vi-latest working"><span class="vi-dot pulse"></span> ${esc(stripStatus(glance && glance.status) || 'Working…')}${msg ? `<span class="vi-latest-snip"> — ${esc(msg)}</span>` : ''}</div>`
      } else if (phase === 'waiting') {
        latest = `<div class="vi-latest waiting">⚠ ${esc(msg || 'Needs your input')}</div>`
      } else if (phase === 'replied') {
        latest = `<div class="vi-latest done">✅ ${esc(activity.reply ? firstLine(activity.reply, 90) : 'Turn complete')}</div>`
      } else if (phase === 'idle' && activity.reply) {
        // Ready keeps the latest turn on screen, same as turn-complete.
        latest = `<div class="vi-latest done">${esc(firstLine(activity.reply, 90))}</div>`
      }
    }
    /* Typed-but-unsent input box content (DEFECT 2 renderer half). */
    const pending = activity && activity.pendingInput
      ? `<div class="vi-pending"><span class="vi-pending-label">typing:</span> ${esc(firstLine(activity.pendingInput, 90))}</div>`
      : ''
    const you = activity && activity.prompt
      ? `<div class="vi-you"><span class="vi-you-label">You:</span> ${esc(firstLine(activity.prompt, 90))}</div>`
      : ''
    /* The coin avatar IS the status — no second status coin in the header. */
    const timeChip = phase === 'idle' && activity && node.running
      ? `<span class="vi-chip dim">${agoLabel(activity.updatedAt)}</span>`
      : ''
    return `
      <div class="vi-head">
        ${agentAvatar(node.preset, off ? 'off' : phase)}
        <div class="vi-title">${esc(node.name)}</div>
        <span class="vi-chip tan">${esc(node.preset)}</span>
        ${node.orch ? '<span class="vi-chip">Orch</span>' : ''}
        ${gitChipHtml(node.git)}
        ${timeChip}
      </div>
      <div class="vi-card-body">${turnTitle}${you}${latest}${pending}</div>
      <div class="mini-row">${coinLed(led, node.preset)}<span class="mini-name">${esc(node.name)}</span></div>`
  }

  function shellCardHtml(node, activity) {
    const lines = activity ? activity.lines : []
    const body = lines.length === 0
      ? '<span class="phos-dim">NO OUTPUT YET</span>'
      : lines.map((l) => `<div class="phos-line">${esc(l || ' ')}</div>`).join('')
    return `
      <div class="node-header">
        <span class="cr-led${node.running ? '' : ' off'}"></span>
        <span class="node-title">${esc(node.name)}</span>
        ${node.orch ? '<span class="cr-chip amber">ORCH</span>' : ''}
        <span class="cr-chip" style="margin-left:auto">${esc(node.preset)}</span>
      </div>
      <div class="cr-phos cr-crt card-screen">${body}<span class="phos-cursor">▮</span></div>
      <div class="mini-row">${coinLed(node.running ? 'idle' : 'off', node.preset)}<span class="mini-name">${esc(node.name)}</span></div>`
  }

  function noteCardHtml(node) {
    return `
      <div class="node-header">
        <span class="node-title">${esc(node.name)}</span>
        ${node.locked ? '<span class="cr-chip" style="margin-left:auto">🔒</span>' : ''}
      </div>
      <div class="note-body">${esc(node.content)}</div>`
  }

  function browserThumbHtml(node) {
    return `
      <div class="browser-body-wrap">
        <img class="browser-thumb" data-src="/api/browser/${esc(node.id)}/thumb" alt=""
             onload="this.classList.add('ok')" onerror="this.classList.remove('ok')" />
        <div class="browser-thumb-empty">
          <span class="browser-thumb-glyph">◍</span>
          <span class="browser-url">${esc(node.url)}</span>
        </div>
      </div>`
  }

  function browserCardHtml(node) {
    return `
      <div class="node-header">
        <span class="browser-dot"></span>
        <span class="node-title">${esc(node.name)}</span>
        <span class="cr-chip violet" style="margin-left:auto">BROWSER</span>
      </div>
      ${browserThumbHtml(node)}`
  }

  // Thumbnails come from the desktop's capturePage() loop (~5s cadence);
  // re-fetch on the same cadence. Covers canvas cards and the open popout.
  function refreshThumbs() {
    for (const img of document.querySelectorAll('img.browser-thumb')) {
      img.src = img.dataset.src + '?v=' + Date.now()
    }
  }
  setInterval(refreshThumbs, 5000)

  function renderWorld() {
    stageEmpty.style.display = nodes.length === 0 ? 'flex' : 'none'
    const html = nodes
      .map((node) => {
        const activity = activities[node.id]
        const pos = `left:${node.position.x}px;top:${node.position.y}px;width:${node.size.width}px;height:${node.size.height}px`
        if (node.kind === 'terminal') {
          const agent = activity ? activity.agent : node.preset !== 'Shell'
          const phase = activity ? activity.phase : 'idle'
          const cls = agent
            ? `card tcard vi-card${phase === 'thinking' ? ' working' : ''}${phase === 'waiting' ? ' attention' : ''}${node.running ? '' : ' offline'}`
            : `card tcard shell-card${node.running ? '' : ' offline'}`
          return `<div class="${cls}" data-id="${esc(node.id)}" style="${pos}">${agent ? agentCardHtml(node, activity) : shellCardHtml(node, activity)}</div>`
        }
        if (node.kind === 'note') {
          return `<div class="card note-card" data-id="${esc(node.id)}" style="${pos}">${noteCardHtml(node)}</div>`
        }
        return `<div class="card browser-card" data-id="${esc(node.id)}" style="${pos}">${browserCardHtml(node)}</div>`
      })
      .join('')
    // Only touch the DOM when the markup actually changed — keeps thumbnail
    // <img> elements (and their loaded frames) stable across polls.
    if (html === lastRenderKey) return
    lastRenderKey = html
    world.innerHTML = html
    refreshThumbs()
  }

  /* ---------- viewport: pan / pinch / fit, desktop semantic zoom ---------- */

  const view = { x: 0, y: 0, scale: 0.3 }
  let fitted = false

  function applyView() {
    world.style.transform = `translate(${view.x}px, ${view.y}px) scale(${view.scale})`
    // Inverse type scale, quantized to 1/8 steps (matches desktop quantInvZoom).
    const inv = view.scale >= 0.95 ? 1 : Math.round((1 / Math.max(view.scale, 0.12)) * 8) / 8
    world.style.setProperty('--z', String(inv))
    world.dataset.mode = view.scale < MINI_ZOOM ? 'mini' : 'compact'
  }

  function fitView() {
    if (nodes.length === 0) return
    const pad = 40
    const minX = Math.min(...nodes.map((n) => n.position.x)) - pad
    const minY = Math.min(...nodes.map((n) => n.position.y)) - pad
    const maxX = Math.max(...nodes.map((n) => n.position.x + n.size.width)) + pad
    const maxY = Math.max(...nodes.map((n) => n.position.y + n.size.height)) + pad
    const rect = stage.getBoundingClientRect()
    const scale = Math.min(rect.width / (maxX - minX), rect.height / (maxY - minY), 1.2)
    view.scale = Math.max(scale, 0.05)
    view.x = (rect.width - (maxX - minX) * view.scale) / 2 - minX * view.scale
    view.y = (rect.height - (maxY - minY) * view.scale) / 2 - minY * view.scale
    applyView()
  }

  const pointers = new Map()
  let gestureMoved = false
  let pinchStart = null

  stage.addEventListener('pointerdown', (e) => {
    stage.setPointerCapture(e.pointerId)
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY })
    gestureMoved = false
    if (pointers.size === 2) {
      const [a, b] = [...pointers.values()]
      pinchStart = {
        dist: Math.hypot(a.x - b.x, a.y - b.y),
        scale: view.scale,
        mid: { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 },
        world: {
          x: ((a.x + b.x) / 2 - view.x) / view.scale,
          y: ((a.y + b.y) / 2 - view.y) / view.scale
        }
      }
    }
  })

  stage.addEventListener('pointermove', (e) => {
    const prev = pointers.get(e.pointerId)
    if (!prev) return
    const dx = e.clientX - prev.x
    const dy = e.clientY - prev.y
    if (Math.hypot(dx, dy) > 3) gestureMoved = true
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY })
    if (pointers.size === 1 && !pinchStart) {
      view.x += dx
      view.y += dy
      applyView()
    } else if (pointers.size === 2 && pinchStart) {
      const [a, b] = [...pointers.values()]
      const dist = Math.hypot(a.x - b.x, a.y - b.y)
      const mid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }
      const scale = Math.min(Math.max(pinchStart.scale * (dist / pinchStart.dist), 0.04), 2.5)
      view.scale = scale
      view.x = mid.x - pinchStart.world.x * scale
      view.y = mid.y - pinchStart.world.y * scale
      applyView()
    }
  })

  const endPointer = (e) => {
    pointers.delete(e.pointerId)
    if (pointers.size < 2) pinchStart = null
  }
  stage.addEventListener('pointerup', endPointer)
  stage.addEventListener('pointercancel', endPointer)

  // Tap (no drag) on a card opens it fullscreen — the mobile analogue of the
  // desktop's click-to-zoom + LOD overlay.
  stage.addEventListener('click', (e) => {
    if (gestureMoved) return
    const card = e.target.closest('.card')
    if (card) openNode(card.dataset.id)
  })

  document.getElementById('fitBtn').addEventListener('click', fitView)

  /* ---------- fullscreen popout ---------- */

  let outputTimer = null

  function openNode(id) {
    const node = nodes.find((n) => n.id === id)
    if (!node) return
    openId = id
    popTitle.textContent = node.name
    popAttention.style.display = 'none'
    composer.classList.remove('on')
    popBody.innerHTML = ''
    if (node.kind === 'terminal') {
      popBody.innerHTML = '<pre id="popTerm" class="cr-phos cr-crt">Loading…</pre>'
      composer.classList.add('on')
      pinnedToBottom = true
      termCols = 0 // fresh element — force a re-fit on the first output poll
      lastOutput = null
      const term = document.getElementById('popTerm')
      term.addEventListener('scroll', () => {
        pinnedToBottom = term.scrollTop + term.clientHeight >= term.scrollHeight - 30
      })
      pollOutput(true)
      outputTimer = setInterval(() => pollOutput(false), 1500)
    } else if (node.kind === 'note') {
      popBody.innerHTML = `<div class="popout-note">${esc(node.content)}</div>`
    } else {
      popBody.innerHTML = `
        <div class="popout-browser">
          ${browserThumbHtml(node)}
          <div class="browser-actions">
            <span class="browser-url">${esc(node.url)}</span>
            <a class="cr-btn primary" href="${esc(node.url)}" target="_blank" rel="noopener">OPEN ↗</a>
          </div>
        </div>`
      refreshThumbs()
    }
    syncPopoutChrome()
    popout.classList.add('open')
    history.pushState({ cookrew: id }, '')
  }

  function closePopout() {
    if (!openId) return
    openId = null
    popout.classList.remove('open')
    if (outputTimer) { clearInterval(outputTimer); outputTimer = null }
    popBody.innerHTML = ''
  }

  document.getElementById('popClose').addEventListener('click', () => history.back())
  window.addEventListener('popstate', closePopout)

  /** Header LED + pixel status chip follow the live turn phase. */
  function syncPopoutChrome() {
    const node = nodes.find((n) => n.id === openId)
    if (!node) return
    if (node.kind !== 'terminal') {
      popLed.setAttribute('class', 'vi-coin-led idle')
      popStatus.textContent = node.kind.toUpperCase()
      popStatus.className = 'card-status'
      return
    }
    const activity = activities[node.id]
    const phase = activity ? activity.phase : 'idle'
    popLed.setAttribute('class', 'vi-coin-led ' + (node.running ? phase : 'off'))
    popStatus.textContent = node.running ? STATUS_LABEL[phase] : 'OFFLINE'
    popStatus.className = 'card-status ' + phase
    popAttention.style.display = phase === 'waiting' ? 'block' : 'none'
  }

  /* Fit-to-screen: the PTY renders at the desktop's width (`cols`), so pick
     the font-size that makes a full line exactly span the phone screen —
     the TUI then scales down instead of soft-wrapping into broken frames. */

  let charRatio = 0.5 // VT323 advance width per px of font-size, measured live
  let termCols = 0
  let lastOutput = null // last painted output (plain var — too big for dataset)

  function measureCharRatio() {
    const probe = document.createElement('span')
    probe.style.cssText =
      'position:absolute;visibility:hidden;white-space:pre;line-height:1;' +
      "font-family:'VT323','Courier New',monospace;font-size:100px"
    probe.textContent = '0'.repeat(20)
    document.body.appendChild(probe)
    const width = probe.getBoundingClientRect().width
    probe.remove()
    if (width > 0) charRatio = width / (20 * 100)
  }

  function fitTerm() {
    const term = document.getElementById('popTerm')
    if (!term || !termCols) return
    const pad = 24 // 12px left + right
    const avail = term.clientWidth - pad
    const size = Math.min(22, Math.max(4.5, avail / (termCols * charRatio)))
    term.style.fontSize = size.toFixed(2) + 'px'
  }

  document.fonts.ready.then(() => {
    measureCharRatio()
    fitTerm()
  })
  window.addEventListener('resize', fitTerm)

  async function pollOutput(force) {
    const term = document.getElementById('popTerm')
    if (!openId || !term) return
    try {
      const data = await api(`/api/terminal/${openId}/output`)
      if (data.cols && data.cols !== termCols) {
        termCols = data.cols
        fitTerm()
      }
      if (force || lastOutput !== data.output) {
        lastOutput = data.output
        term.textContent = data.output || '(no output yet)'
        if (pinnedToBottom) term.scrollTop = term.scrollHeight
      }
    } catch (error) {
      term.textContent = '⚠ ' + error.message
    }
  }

  /* ---------- composer: send / ask / voice ---------- */

  async function send() {
    const text = promptEl.value.trim()
    if (!text || !openId) return
    promptEl.value = ''
    if (speakReplies) {
      sendBtn.disabled = true
      try {
        const { reply } = await api(`/api/terminal/${openId}/ask`, postJson(text))
        speak(reply)
      } catch (error) {
        speak('Request failed: ' + error.message)
      }
      sendBtn.disabled = false
    } else {
      await api(`/api/terminal/${openId}/input`, postJson(text)).catch(() => undefined)
    }
    pollOutput(true)
  }

  function speak(text) {
    const gist = (text || 'done').replace(/\s+/g, ' ').trim().slice(0, 300)
    const utterance = new SpeechSynthesisUtterance(gist)
    speechSynthesis.cancel()
    speechSynthesis.speak(utterance)
  }

  sendBtn.onclick = send
  promptEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send() })

  /* ---------- 📎 attachments: upload to the desktop, path joins the message ---------- */

  const attachBtn = document.getElementById('attach')
  const attachInput = document.getElementById('attachFile')

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader()
      reader.onload = () => { const url = String(reader.result); resolve(url.slice(url.indexOf(',') + 1)) }
      reader.onerror = () => reject(reader.error || new Error('Read failed'))
      reader.readAsDataURL(file)
    })
  }

  attachBtn.onclick = () => { if (openId) attachInput.click() }
  attachInput.onchange = async () => {
    const files = Array.from(attachInput.files || [])
    attachInput.value = ''
    if (files.length === 0 || !openId) return
    attachBtn.disabled = true
    try {
      for (const file of files) {
        const body = JSON.stringify({ name: file.name, data: await fileToBase64(file) })
        const saved = await api('/api/attachments', { method: 'POST', headers: { 'content-type': 'application/json' }, body })
        // The saved path joins the draft message so the user sees exactly
        // what the agent will receive (uploads get shell-safe names).
        promptEl.value = (promptEl.value.trim() ? promptEl.value.trim() + ' ' : '') + saved.path + ' '
      }
      promptEl.focus()
    } catch (error) {
      promptEl.placeholder = '⚠ ' + (error && error.message ? error.message : 'Attach failed')
      setTimeout(() => { promptEl.placeholder = 'Message this agent…' }, 4000)
    }
    attachBtn.disabled = false
  }
  speakToggle.onclick = () => {
    speakReplies = !speakReplies
    speakToggle.classList.toggle('on', speakReplies)
    if (speakReplies) speak('Spoken replies on')
  }

  const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition
  if (Recognition) {
    let recognizing = false
    const recognizer = new Recognition()
    recognizer.interimResults = true
    recognizer.onresult = (event) => {
      promptEl.value = Array.from(event.results).map((r) => r[0].transcript).join('')
    }
    recognizer.onend = () => {
      recognizing = false
      micBtn.classList.remove('listening')
      if (promptEl.value.trim()) send()
    }
    micBtn.onclick = () => {
      if (recognizing) { recognizer.stop(); return }
      recognizing = true
      micBtn.classList.add('listening')
      promptEl.value = ''
      recognizer.start()
    }
  } else {
    micBtn.style.opacity = '0.35'
    micBtn.onclick = () => {
      const insecure = location.protocol !== 'https:' && location.hostname !== 'localhost'
      alert(
        insecure
          ? 'Voice dictation is blocked because this page is plain HTTP.\n\n' +
            'Browsers only allow the microphone over HTTPS (or localhost). ' +
            'Reopen Cookrew Mobile at the https:// address that `cookrew mobile` prints, ' +
            'accept the one-time certificate warning, and the mic will work.\n\n' +
            'Current URL: ' + location.href
          : 'Voice dictation needs a browser with the Web Speech API ' +
            '(Safari on iOS, Chrome on Android/desktop).'
      )
    }
  }

  /* ---------- state polling ---------- */

  async function refreshState() {
    try {
      const state = await api('/api/state')
      document.getElementById('wsName').textContent = state.workspace
      nodes = state.nodes
      activities = state.activities
      renderWorld()
      syncPopoutChrome()
      if (!fitted && nodes.length > 0) {
        fitted = true
        fitView()
      }
    } catch (error) {
      stageEmpty.textContent = 'CANNOT REACH COOKREW: ' + error.message
      stageEmpty.style.display = 'flex'
    }
  }

  applyView()
  refreshState()
  setInterval(refreshState, 2000)
})()
</script>
</body>
</html>
